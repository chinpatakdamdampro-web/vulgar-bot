name: Build PvPBot 1.21.1

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pvpbot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Download wrapper jar if missing
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            mkdir -p gradle/wrapper
            curl -o gradle/wrapper/gradle-wrapper.jar \
              https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Build mod
        run: ./gradlew build --no-daemon --no-build-cache

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: pvpbot-1.21.1-${{ github.sha }}
          path: pvpbot/build/libs/*.jar
          if-no-files-found: error
